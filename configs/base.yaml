# [PROPOSAL] shared hyperparameters across all stages
project_name: tumor-synthesis

data:
  # [PROPOSAL] three datasets
  organs: [pancreas, liver, kidney]
  raw_dir: data/raw          # expects {organ}/images/ and {organ}/labels/
  cache_dir: data/cache
  patch_size: [96, 96, 96]   # [ENG] subvolume patch, balances memory vs context
  ct_window: [-150, 250]     # [ENG] HU abdominal soft tissue window
  overlap: 0.25              # [ENG] patch overlap for inference sliding window
  num_workers: 4
  pin_memory: true

training:
  seed: 42
  device: cuda               # falls back to cpu if unavailable
  amp: true                  # automatic mixed precision [ENG]
  grad_clip: 1.0

output:
  checkpoint_dir: outputs/checkpoints
  sample_dir: outputs/samples
  log_dir: outputs/logs
